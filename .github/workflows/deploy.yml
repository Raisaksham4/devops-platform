name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
  
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      APP_NAME: ${{ secrets.APP_NAME }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_wrapper: false

    # -------------------------
    # TERRAFORM
    # -------------------------
    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform

    - name: Get EC2 Public IP
      run: |
        terraform output ec2_public_ip > ip.txt
        EC2_IP=$(grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' ip.txt)
        printf "EC2_IP=%s\n" "$EC2_IP" >> $GITHUB_ENV
      working-directory: terraform

    # -------------------------
    # BUILD & PUSH
    # -------------------------
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
    - name: Clone User Repo
      run: |
        git clone $APP_REPO_URL app
      env:
        APP_REPO_URL: ${{ secrets.APP_REPO_URL }}


    - name: Generate Dockerfile if missing
      run: |
        cd app

        if [ ! -f Dockerfile ]; then
          echo "No Dockerfile found. Creating one..."

          cat <<EOF > Dockerfile
          FROM node:18
          WORKDIR /app
          COPY . .
          RUN npm install
          EXPOSE 3000
          CMD ["node", "server.js"]
          EOF
        fi

    - name: Build Docker image
      run: |
        cd app
        docker build -t $APP_NAME .

    - name: Tag image
      run: docker tag myapp:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$APP_NAME:latest

    - name: Push to ECR
      run: docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$APP_NAME:latest
    # -------------------------
    # DEPLOY
    # -------------------------
    - name: Deploy to EC2
      run: |
        echo "$EC2_SSH_KEY" > key.pem
        chmod 600 key.pem

        ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_IP << EOF
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$APP_NAME:latest

          docker run -d -p 80:3000 --name $APP_NAME $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$APP_NAME:latest
        EOF
      env:
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

    # -------------------------
    # CLEANUP (FINAL STEP)
    # -------------------------
    - name: Cleanup on failure
      if: failure()
      run: terraform destroy -auto-approve
      working-directory: terraform